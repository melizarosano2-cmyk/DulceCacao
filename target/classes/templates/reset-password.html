<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout :: head"></head>

<body>
    <nav th:replace="layout :: navbar"></nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <div th:if="${valid}">
                            <h2 class="card-title">Restablecer Contraseña</h2>
                            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                            <form th:action="@{/reset-password}" method="post">
                                <input type="hidden" name="token" th:value="${token}">
                                <div class="mb-3">
                                    <label for="password" class="form-label">Nueva Contraseña</label>
                                    <input type="password" class="form-control" id="password" name="password" required
                                        minlength="6">
                                </div>
                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label">Confirmar Contraseña</label>
                                    <input type="password" class="form-control" id="confirmPassword"
                                        name="confirmPassword" required minlength="6">
                                </div>
                                <button type="submit" class="btn btn-primary">Restablecer Contraseña</button>
                            </form>
                        </div>
                        <div th:unless="${valid}">
                            <h2 class="card-title text-danger">Enlace Inválido</h2>
                            <p th:text="${message}"></p>
                            <a th:href="@{/forgot-password}" class="btn btn-primary">Solicitar Nuevo Enlace</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="layout :: footer"></footer>
</body>

</html>

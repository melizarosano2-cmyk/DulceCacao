<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout :: head"></head>

<body>
    <nav th:replace="layout :: navbar"></nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body text-center">
                        <div th:if="${success}">
                            <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
                            <h2 class="card-title text-success mt-3">¡Email Verificado!</h2>
                            <p class="lead" th:text="${message}"></p>
                            <a th:href="@{/login}" class="btn btn-success">Iniciar Sesión</a>
                        </div>
                        <div th:unless="${success}">
                            <i class="bi bi-x-circle text-danger" style="font-size: 4rem;"></i>
                            <h2 class="card-title text-danger mt-3">Error de Verificación</h2>
                            <p class="lead" th:text="${message}"></p>
                            <a th:href="@{/}" class="btn btn-primary">Volver al Inicio</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="layout :: footer"></footer>
</body>

</html>

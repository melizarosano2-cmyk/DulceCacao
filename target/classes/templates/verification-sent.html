<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout :: head"></head>

<body>
    <nav th:replace="layout :: navbar"></nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body text-center">
                        <h2 class="card-title">¡Verifica tu correo electrónico!</h2>
                        <p class="lead">Hemos enviado un correo de verificación a tu dirección de email.</p>
                        <p>Por favor, revisa tu bandeja de entrada y haz clic en el enlace de verificación para activar
                            tu cuenta.</p>
                        <p class="text-muted">Si no ves el correo, revisa tu carpeta de spam.</p>
                        <hr>
                        <a th:href="@{/}" class="btn btn-primary">Volver al Inicio</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="layout :: footer"></footer>
</body>

</html>

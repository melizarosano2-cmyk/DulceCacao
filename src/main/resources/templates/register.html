<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout :: head"></head>

<body style="background: linear-gradient(135deg, var(--cream) 0%, var(--gray-light) 100%);">
    <nav th:replace="layout :: navbar"></nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg fade-in" style="border: none; border-radius: 16px;">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <div style="font-size: 4rem; margin-bottom: 20px;">✨</div>
                            <h2 class="text-chocolate mb-2" style="font-family: var(--font-heading);">Crear Cuenta</h2>
                            <p class="text-muted">Únete a la familia Dulce Cacao</p>
                        </div>

                        <div th:if="${error}" class="alert alert-danger fade-in" th:text="${error}"></div>

                        <form th:action="@{/register}" th:object="${cliente}" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="username" class="form-label">Usuario</label>
                                    <input type="text" class="form-control" id="username" th:field="*{username}"
                                        placeholder="Tu usuario" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="fullName" class="form-label">Nombre Completo</label>
                                    <input type="text" class="form-control" id="fullName" th:field="*{fullName}"
                                        placeholder="Tu nombre" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" th:field="*{email}"
                                    placeholder="tu@email.com" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" th:field="*{password}"
                                    placeholder="Mínimo 8 caracteres (A-Z, a-z, 0-9, especial)" required
                                    pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&._\-#]).{8,}$"
                                    title="La contraseña debe tener al menos 8 caracteres, e incluir al menos una mayúscula, una minúscula, un número y un carácter especial (@, $, !, %, *, ?, &, ., _, -, #)">
                            </div>


                            <div class="mb-3">
                                <label for="direccion" class="form-label">Dirección</label>
                                <input type="text" class="form-control" id="direccion" th:field="*{direccion}"
                                    placeholder="Tu dirección de envío" required>
                            </div>

                            <div class="mb-3">
                                <label for="telefono" class="form-label">Teléfono</label>
                                <input type="tel" class="form-control" id="telefono" th:field="*{telefono}"
                                    placeholder="+598 99 123 456" required>
                            </div>

                            <div class="mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="recibirPromociones"
                                        th:field="*{recibirPromociones}" value="Si">
                                    <label class="form-check-label" for="recibirPromociones">
                                        Deseo recibir promociones y novedades por email
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mb-3" style="padding: 12px;">
                                Crear Mi Cuenta
                            </button>
                        </form>

                        <hr class="my-4">

                        <div class="text-center">
                            <p class="text-muted mb-2" style="font-size: 0.875rem;">¿Ya tienes una cuenta?</p>
                            <a th:href="@{/login}" class="btn btn-secondary w-100">
                                Iniciar Sesión
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="layout :: footer"></footer>
</body>

</html>

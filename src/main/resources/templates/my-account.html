<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="layout :: head"></head>

<body>
    <nav th:replace="layout :: navbar"></nav>

    <div class="container mt-4 mb-5">
        <div class="row mb-4">
            <div class="col-12">
                <h1 class="text-chocolate" style="font-family: var(--font-heading);">👤 Mi Cuenta</h1>
                <p class="text-muted">Gestiona tu información personal</p>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="card shadow-lg fade-in" style="border: none; border-radius: 16px;">
                    <div class="card-header"
                        style="background: linear-gradient(135deg, var(--chocolate-dark) 0%, var(--chocolate-medium) 100%);">
                        <h5 class="mb-0 text-gold-light">Información Personal</h5>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${message}" class="alert alert-success fade-in" th:text="${message}"></div>
                        <div th:if="${error}" class="alert alert-danger fade-in" th:text="${error}"></div>

                        <form th:action="@{/my-account/update}" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="username" class="form-label">Usuario</label>
                                    <input type="text" class="form-control" id="username" name="username"
                                        th:value="${user.username}" readonly
                                        style="background-color: var(--gray-light);">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="fullName" class="form-label">Nombre Completo</label>
                                    <input type="text" class="form-control" id="fullName" name="fullName"
                                        th:value="${user.fullName}" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email"
                                    th:value="${user.email}" required>
                            </div>

                            <div th:if="${user.class.simpleName == 'Cliente'}">
                                <div class="mb-3">
                                    <label for="direccion" class="form-label">Dirección</label>
                                    <input type="text" class="form-control" id="direccion" name="direccion"
                                        th:value="${user.direccion}" required>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="telefono" class="form-label">Teléfono</label>
                                        <input type="tel" class="form-control" id="telefono" name="telefono"
                                            th:value="${user.telefono}" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label">Promociones</label>
                                        <div class="form-check mt-2">
                                            <input class="form-check-input" type="checkbox" id="recibirPromociones"
                                                name="recibirPromociones" value="Si"
                                                th:checked="${user.recibirPromociones == 'Si'}">
                                            <label class="form-check-label" for="recibirPromociones">
                                                Recibir promociones por email
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <hr class="my-4">

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    💾 Guardar Cambios
                                </button>
                                <a th:href="@{/}" class="btn btn-secondary">
                                    Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="layout :: footer"></footer>
</body>

</html>
